<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THK Studio | The Modern African</title>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #ffffff; color: #111; text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 100vh; }
        h1 { font-size: 2.2rem; letter-spacing: 8px; margin-bottom: 5px; color: #000; font-weight: 700; text-transform: uppercase; }
        .tagline { color: #999; font-size: 0.75rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 5px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        h2 { font-weight: 600; font-size: 1.6rem; margin-bottom: 10px; letter-spacing: 1px; }
        .price-tag { font-size: 1.1rem; color: #111; margin-bottom: 35px; font-weight: 300; }
        
        .btn { display: inline-block; background-color: #000; color: #fff; padding: 20px 0; border-radius: 0px; font-weight: bold; font-size: 0.9rem; transition: 0.4s; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; width: 100%; -webkit-appearance: none; text-decoration: none; }
        .btn:hover { background-color: #333; }
        
        @media (max-width: 480px) { 
            h1 { font-size: 1.6rem; letter-spacing: 4px; } 
            .tagline { font-size: 0.6rem; letter-spacing: 3px; margin-bottom: 25px; } 
            .container { padding: 15px; } 
            h2 { font-size: 1.3rem; } 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THK STUDIO</h1>
        <p class="tagline">Cinema of the Continent</p>

        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/lMRBslhC2Tk?rel=0" 
                title="The Modern African Trailer" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <h2>"The Modern African"</h2>
        <p class="price-tag">MWK 1,000</p>

        <form method="POST" action="https://api.paychangu.com/hosted-payment-page" id="paymentForm">
            <input type="hidden" name="public_key" value="PUB-6JGpe5mCa4Q2GecNfsST51PbjrPs5UMw" />
            <input type="hidden" name="amount" value="1000" />
            <input type="hidden" name="currency" value="MWK" />
            <input type="hidden" name="tx_ref" id="tx_ref" value="" />
            <input type="hidden" name="callback_url" value="https://thkstudio.pages.dev/watch.html" />
            <input type="hidden" name="return_url" value="https://thkstudio.pages.dev/watch.html" />
            <input type="hidden" name="first_name" value="Viewer" />
            <input type="hidden" name="email" value="customer@thkstudio.com" />
            <input type="hidden" name="title" value="The Modern African" />
            <input type="submit" value="Pay 1,000 MWK & Download" class="btn">
        </form>
    </div>

    <script>
        document.getElementById('tx_ref').value = 'THK-' + Math.floor(Date.now() / 1000);
    </script>
</body>
</html>
