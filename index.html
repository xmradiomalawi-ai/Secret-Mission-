<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabulous Stream - Gatekeeper</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- PayChangu Inline Popup Library -->
    <script src="https://in.paychangu.com/js/popup.js"></script>
    
    <style>
        :root {
            --bg-color: #141414;
            --primary-color: #E50914;
            --text-color: #FFFFFF;
            --text-muted: #AAAAAA;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
        }
        .logo span {
            color: var(--primary-color);
        }
        .auth-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 4%;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(0deg, var(--bg-color) 0%, rgba(20,20,20,0.6) 100%);
        }
        .content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin-top: 80px;
        }
        .content h1 {
            font-size: clamp(32px, 5vw, 56px);
            margin-bottom: 15px;
        }
        .content p {
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            gap: 15px;
        }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-secondary { background-color: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); }
        .btn-watch { background-color: #2ecc71; color: white; display: none; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">FABULOUS<span>STREAM</span></div>
        <button id="auth-status" class="auth-btn">Loading...</button>
    </header>

    <section class="hero" id="hero-bg">
        <div class="content">
            <h1 id="movie-title">Loading Title...</h1>
            <p id="movie-desc">Fetching details...</p>
            
            <div id="action-area">
                <div id="gatekeeper-actions" class="btn-group" style="display: none;">
                    <button class="btn btn-secondary" onclick="initiatePayment('rent')">Rent for <span id="rent-price">...</span></button>
                    <button class="btn btn-primary" onclick="initiatePayment('buy')">Buy for <span id="buy-price">...</span></button>
                </div>
                <button id="watch-now-btn" class="btn btn-watch" onclick="goToPlayer()">🎬 Watch Movie Now</button>
            </div>
        </div>
    </section>

    <script>
        // CONFIGURATION: Connected to your exact Supabase project backend
        const SUPABASE_URL = "https://aqyypmswkyffnpsmqfwm.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxeXlwbXN3a3lmZm5wc21xZndtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDQ1MDUsImV4cCI6MjA5ODkyMDUwNX0.-0BF0z0l2aLF4nLc5qUWlAV7ypfwlGnMAtnX3--rEKo"; 
        
        // PAYCHANGU CONFIGURATION: Swap "pub-test-..." with your production key when ready
        const PAYCHANGU_PUBLIC_KEY = "pub-test-HYSBQpa5K91mmXMHrjhkmC6mAjObPJ2u";
        const PAYMENT_CURRENCY = "USD"; // Choose either 'USD' or 'MWK' as preferred by your account setups

        // Initializing the Supabase client safely
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentMovie = null;
        let currentUserSession = null;

        async function init() {
            await fetchMovie();
            await checkUserSession();
            await handlePaymentCallback(); // Checks if returning from a completed payment
        }

        async function checkUserSession() {
            const { data: { session } } = await supabase.auth.getSession();
            const authBtn = document.getElementById('auth-status');
            currentUserSession = session;
            
            if (session) {
                authBtn.innerText = "Log Out";
                authBtn.onclick = () => supabase.auth.signOut().then(() => window.location.reload());
                checkAccess(session.user.id);
            } else {
                authBtn.innerText = "Sign In / Register";
                authBtn.onclick = handleAuth;
                document.getElementById('gatekeeper-actions').style.display = 'flex';
            }
        }

        async function handleAuth() {
            const email = prompt("Enter email:");
            const password = prompt("Enter password (min 6 chars):");
            if (!email || !password) return null;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
                if (signUpError) {
                    alert(signUpError.message);
                    return null;
                } else { 
                    alert("Account created!"); 
                    window.location.reload(); 
                    return signUpData.session;
                }
            } else {
                window.location.reload();
                return data.session;
            }
        }

        async function fetchMovie() {
            const { data, error } = await supabase.from('movies').select('*').limit(1).single();
            if (error) return console.error(error);
            
            currentMovie = data;
            document.getElementById('movie-title').innerText = data.title;
            document.getElementById('movie-desc').innerText = data.description;
            document.getElementById('rent-price').innerText = `$${data.rent_price}`;
            document.getElementById('buy-price').innerText = `$${data.buy_price}`;
            document.getElementById('hero-bg').style.backgroundImage = `url('${data.thumbnail_url}')`;
        }

        async function checkAccess(userId) {
            if (!currentMovie) return;
            const { data: purchases } = await supabase.from('purchases').select('*').eq('user_id', userId).eq('movie_id', currentMovie.id);
            
            const hasAccess = purchases?.some(p => {
                if (p.purchase_type === 'buy') return true;
                if (p.purchase_type === 'rent') return new Date(p.expires_at) > new Date();
                return false;
            });

            if (hasAccess) {
                document.getElementById('watch-now-btn').style.display = 'inline-block';
                document.getElementById('gatekeeper-actions').style.display = 'none';
            } else {
                document.getElementById('gatekeeper-actions').style.display = 'flex';
            }
        }

        // --- NEW: Initiate PayChangu Checkout ---
        async function initiatePayment(type) {
            // Require user to be logged in first
            if (!currentUserSession) {
                alert("Please log in or register before completing your purchase!");
                const activeSession = await handleAuth();
                if (!activeSession) return;
            }

            const price = type === 'rent' ? currentMovie.rent_price : currentMovie.buy_price;
            const txRef = "tx-" + Date.now() + "-" + Math.floor(Math.random() * 1000000);

            // Construct callback URL to point back to index.html with success state query parameters
            const currentUrl = new URL(window.location.href);
            currentUrl.searchParams.set('payment_success', 'true');
            currentUrl.searchParams.set('tx_ref', txRef);
            
            // Temporarily store checkout data to local storage so we can insert it into Supabase upon successful return redirect
            localStorage.setItem('pending_checkout', JSON.stringify({
                user_id: currentUserSession.user.id,
                movie_id: currentMovie.id,
                purchase_type: type,
                tx_ref: txRef
            }));

            // Launch PayChangu Checkout popup flow
            PaychanguCheckout({
                "public_key": PAYCHANGU_PUBLIC_KEY,
                "tx_ref": txRef,
                "amount": Number(price),
                "currency": PAYMENT_CURRENCY,
                "email": currentUserSession.user.email || "customer@fabulousstream.com",
                "first_name": "Customer",
                "callback_url": currentUrl.toString(),
                "return_url": window.location.href,
                "customization": {
                    "title": `Fabulous Stream: ${currentMovie.title}`,
                    "description": `${type.toUpperCase()} - ${currentMovie.title}`
                }
            });
        }

        // --- NEW: Handle Returning Successfully from PayChangu ---
        async function handlePaymentCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const isSuccess = urlParams.get('payment_success') === 'true';
            const txRef = urlParams.get('tx_ref');

            if (isSuccess && txRef) {
                const storedData = localStorage.getItem('pending_checkout');
                if (storedData) {
                    const checkout = JSON.parse(storedData);

                    // Check if this pending transaction matches the URL reference safely
                    if (checkout.tx_ref === txRef) {
                        let expiresAt = null;
                        if (checkout.purchase_type === 'rent') {
                            // Calculate rent expiration time (e.g. 48 hours from now)
                            const date = new Date();
                            date.setHours(date.getHours() + 48);
                            expiresAt = date.toISOString();
                        }

                        // Insert the record straight into Supabase database
                        const { error } = await supabase.from('purchases').insert([{
                            user_id: checkout.user_id,
                            movie_id: checkout.movie_id,
                            purchase_type: checkout.purchase_type,
                            expires_at: expiresAt,
                            created_at: new Date().toISOString()
                        }]);

                        if (error) {
                            console.error("Error updating purchases:", error.message);
                            alert("Something went wrong claiming your purchase. Contact support with transaction ref: " + txRef);
                        } else {
                            alert(`🎉 Payment Successful! Enjoy watching "${currentMovie?.title || 'your movie'}"!`);
                            // Remove local cache so we don't repeat the action on simple refreshes
                            localStorage.removeItem('pending_checkout');
                            
                            // Clean up browser URL clean parameters cleanly without refreshing again
                            window.history.replaceState({}, document.title, window.location.pathname);
                            
                            // Recheck the UI permission mapping
                            if (currentUserSession) {
                                await checkAccess(currentUserSession.user.id);
                            }
                        }
                    }
                }
            }
        }

        function goToPlayer() {
            window.location.href = "watch.html";
        }

        init();
    </script>
</body>
</html>
