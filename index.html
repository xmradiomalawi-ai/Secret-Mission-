<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabulous Stream - Gatekeeper</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #141414;
            --primary-color: #E50914;
            --text-color: #FFFFFF;
            --text-muted: #AAAAAA;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
        }
        .logo span {
            color: var(--primary-color);
        }
        .auth-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 4%;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(0deg, var(--bg-color) 0%, rgba(20,20,20,0.6) 100%);
        }
        .content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin-top: 80px;
        }
        .content h1 {
            font-size: clamp(32px, 5vw, 56px);
            margin-bottom: 15px;
        }
        .content p {
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            gap: 15px;
        }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-secondary { background-color: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); }
        .btn-watch { background-color: #2ecc71; color: white; display: none; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">FABULOUS<span>STREAM</span></div>
        <button id="auth-status" class="auth-btn">Loading...</button>
    </header>

    <section class="hero" id="hero-bg">
        <div class="content">
            <h1 id="movie-title">Loading Title...</h1>
            <p id="movie-desc">Fetching details...</p>
            
            <div id="action-area">
                <div id="gatekeeper-actions" class="btn-group" style="display: none;">
                    <button class="btn btn-secondary" onclick="alert('Payment integration coming soon!')">Rent for <span id="rent-price">...</span></button>
                    <button class="btn btn-primary" onclick="alert('Payment integration coming soon!')">Buy for <span id="buy-price">...</span></button>
                </div>
                <button id="watch-now-btn" class="btn btn-watch" onclick="goToPlayer()">🎬 Watch Movie Now</button>
            </div>
        </div>
    </section>

    <script>
        // CONFIGURATION: Connected to your exact Supabase project backend
        const SUPABASE_URL = "https://aqyypmswkyffnpsmqfwm.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxeXlwbXN3a3lmZm5wc21xZndtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDQ1MDUsImV4cCI6MjA5ODkyMDUwNX0.-0BF0z0l2aLF4nLc5qUWlAV7ypfwlGnMAtnX3--rEKo"; 
        
        // Initializing the Supabase client safely
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentMovie = null;

        async function init() {
            await fetchMovie();
            checkUserSession();
        }

        async function checkUserSession() {
            const { data: { session } } = await supabase.auth.getSession();
            const authBtn = document.getElementById('auth-status');
            
            if (session) {
                authBtn.innerText = "Log Out";
                authBtn.onclick = () => supabase.auth.signOut().then(() => window.location.reload());
                checkAccess(session.user.id);
            } else {
                authBtn.innerText = "Sign In / Register";
                authBtn.onclick = handleAuth;
                document.getElementById('gatekeeper-actions').style.display = 'flex';
            }
        }

        async function handleAuth() {
            const email = prompt("Enter email:");
            const password = prompt("Enter password (min 6 chars):");
            if (!email || !password) return;

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                const { error: signUpError } = await supabase.auth.signUp({ email, password });
                if (signUpError) alert(signUpError.message);
                else { alert("Account created!"); window.location.reload(); }
            } else {
                window.location.reload();
            }
        }

        async function fetchMovie() {
            const { data, error } = await supabase.from('movies').select('*').limit(1).single();
            if (error) return console.error(error);
            
            currentMovie = data;
            document.getElementById('movie-title').innerText = data.title;
            document.getElementById('movie-desc').innerText = data.description;
            document.getElementById('rent-price').innerText = `$${data.rent_price}`;
            document.getElementById('buy-price').innerText = `$${data.buy_price}`;
            document.getElementById('hero-bg').style.backgroundImage = `url('${data.thumbnail_url}')`;
        }

        async function checkAccess(userId) {
            if (!currentMovie) return;
            const { data: purchases } = await supabase.from('purchases').select('*').eq('user_id', userId).eq('movie_id', currentMovie.id);
            
            const hasAccess = purchases?.some(p => {
                if (p.purchase_type === 'buy') return true;
                if (p.purchase_type === 'rent') return new Date(p.expires_at) > new Date();
                return false;
            });

            if (hasAccess) {
                document.getElementById('watch-now-btn').style.display = 'inline-block';
                document.getElementById('gatekeeper-actions').style.display = 'none';
            } else {
                document.getElementById('gatekeeper-actions').style.display = 'flex';
            }
        }

        function goToPlayer() {
            window.location.href = "watch.html";
        }

        init();
    </script>
</body>
</html>
