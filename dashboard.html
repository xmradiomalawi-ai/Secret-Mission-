<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XM STUDIO - PWA Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.44.0/dist/umd/supabase.js"></script>
    <script src="https://js.paychangu.com/v1/inline.js"></script>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-transitional">
    <meta name="apple-mobile-web-app-title" content="XM STUDIO">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    
    <style>
        body { background-color: #0c0c0e; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0c0c0e; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <div id="auth-gate" class="fixed inset-0 z-50 bg-[#0c0c0e] flex flex-col justify-center items-center px-6">
        <div class="w-full max-w-sm flex flex-col items-center justify-between h-[85vh]">
            <div class="flex flex-col items-center justify-center flex-grow">
                <div class="w-44 h-44 bg-black rounded-[40px] flex flex-col items-center justify-center border border-zinc-900 shadow-2xl overflow-hidden">
                    <img src="apple-touch-icon.png" alt="XM STUDIO Logo" class="w-full h-full object-cover">
                </div>
            </div>

            <div class="w-full pb-8">
                <div id="state-welcome" class="space-y-4">
                    <button onclick="setAuthState('signin')" class="w-full bg-white text-black hover:bg-zinc-100 font-bold py-3.5 px-6 rounded-xl shadow-md text-sm transition-all border border-zinc-200">Sign In</button>
                    <button onclick="setAuthState('signup')" class="w-full bg-transparent hover:bg-zinc-900 text-white font-bold py-3.5 px-6 rounded-xl text-sm transition-all border border-zinc-700">Sign Up</button>
                </div>

                <div id="state-forms" class="hidden space-y-4">
                    <div class="space-y-3">
                        <input type="email" id="auth-email" placeholder="Email" class="w-full bg-zinc-950 border border-zinc-800 focus:border-[#FF3E1F] text-white py-3 px-4 rounded-xl placeholder-zinc-700 focus:outline-none transition text-sm">
                        <input type="password" id="auth-password" placeholder="Password" class="w-full bg-zinc-950 border border-zinc-800 focus:border-[#FF3E1F] text-white py-3 px-4 rounded-xl placeholder-zinc-700 focus:outline-none transition text-sm">
                        <input type="password" id="auth-rewrite-password" placeholder="Rewrite Password" class="hidden w-full bg-zinc-950 border border-zinc-800 focus:border-[#FF3E1F] text-white py-3 px-4 rounded-xl placeholder-zinc-700 focus:outline-none transition text-sm">
                    </div>
                    <button onclick="executeAuthSubmit()" class="w-full bg-white text-black hover:bg-zinc-100 font-bold py-3.5 px-6 rounded-xl shadow-md text-sm transition-all"><span id="primary-btn-text">Sign In</span></button>
                    <button onclick="setAuthState('welcome')" class="w-full text-xs text-zinc-600 underline">Back</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-dashboard" class="hidden flex-grow flex flex-col min-h-screen pb-24 bg-[#0c0c0e]">
        <header class="sticky top-0 z-40 bg-[#0c0c0e] px-6 py-4 border-b border-zinc-900 flex justify-between">
            <span class="text-[#FF3E1F] font-black text-xl tracking-wider">XM STUDIO</span>
        </header>

        <main id="view-home" class="px-6 py-6 flex-grow overflow-y-auto custom-scroll">
            <div id="movie-catalog" class="grid grid-cols-2 gap-x-6 gap-y-8 max-w-md mx-auto"></div>
        </main>

        <main id="view-search" class="hidden px-6 py-6 flex-grow max-w-md mx-auto w-full">
            <h2 class="text-xl font-bold text-white mb-4">Search</h2>
            <input type="text" oninput="handleSearch(this.value)" placeholder="Search catalog..." class="w-full bg-zinc-900 border border-zinc-800 text-white py-3 px-4 rounded-xl mb-6">
            <div id="search-results" class="grid grid-cols-2 gap-x-6 gap-y-8"></div>
        </main>

        <main id="view-profile" class="hidden px-6 py-6 flex-grow max-w-md mx-auto w-full flex flex-col justify-between">
            <div class="space-y-6">
                <h2 class="text-xl font-bold">Profile Portal</h2>
                <div class="bg-zinc-950 p-5 rounded-2xl border border-zinc-900">
                    <p id="profile-email-display" class="text-xs text-zinc-400"></p>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-zinc-400 mb-3"><i class="fa-solid fa-film text-[#FF3E1F]"></i> Your Library</h3>
                    <div id="user-library-container" class="grid grid-cols-2 gap-4"></div>
                </div>
            </div>
            <button onclick="logout()" class="w-full bg-zinc-950 text-[#FF3E1F] py-3.5 rounded-xl border border-zinc-900 text-xs">LOG OUT</button>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#0c0c0e] border-t border-zinc-900 py-4 px-8 z-40 flex justify-center">
            <div class="flex items-center justify-between w-full max-w-sm gap-2">
                <button id="nav-btn-home" onclick="switchDashboardTab('home')" class="flex-1 py-2 rounded-xl bg-[#FF3E1F] text-white"><i class="fa-solid fa-house"></i></button>
                <button id="nav-btn-profile" onclick="switchDashboardTab('profile')" class="flex-1 py-2 rounded-xl bg-transparent text-zinc-400 border border-zinc-800"><i class="fa-solid fa-user"></i></button>
                <button id="nav-btn-search" onclick="switchDashboardTab('search')" class="flex-1 py-2 rounded-xl bg-transparent text-zinc-400 border border-zinc-800"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </nav>
    </div>

    <script>
        const SUPABASE_URL = "https://aqyypmswkyffnpsmqfwm.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxeXlwbXN3a3lmZm5wc21xZndtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDQ1MDUsImV4cCI6MjA5ODkyMDUwNX0.-0BF0z0l2aLF4nLc5qUWlAV7ypfwlGnMAtnX3--rEKo"; 
        let supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let activeUser = null, cachedMovies = [];

        async function runInit() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) { 
                activeUser = session.user; 
                showDashboard(); 
            }
        }

        function showDashboard() {
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('profile-email-display').innerText = activeUser.email;
            fetchDashboardContent();
            fetchUserLibrary();
        }

        // FULLY RESTORED LIBRARY FETCH LOGIC
        async function fetchUserLibrary() {
            const container = document.getElementById('user-library-container');
            const { data, error } = await supabase
                .from('purchases')
                .select('movie_id, movies(id, title, thumbnail_url)')
                .eq('user_id', activeUser.id);
            
            if (error || !data || data.length === 0) {
                container.innerHTML = '<p class="text-xs text-zinc-600">No purchased titles found.</p>';
                return;
            }

            container.innerHTML = data.map(item => {
                const movie = item.movies;
                return `
                    <div class="flex flex-col gap-2 cursor-pointer" onclick="alert('Playing: ${movie.title}')">
                        <img src="${movie.thumbnail_url}" class="rounded-xl aspect-square object-cover border border-zinc-800">
                        <h4 class="text-xs font-bold truncate">${movie.title}</h4>
                    </div>`;
            }).join('');
        }

        async function fetchDashboardContent() {
            const { data } = await supabase.from('movies').select('*');
            cachedMovies = data || [];
            renderMovies(cachedMovies, 'movie-catalog');
        }

        function renderMovies(list, id) {
            document.getElementById(id).innerHTML = list.map(m => `
                <div class="flex flex-col gap-2 cursor-pointer" onclick="alert('Viewing: ${m.title}')">
                    <img src="${m.thumbnail_url}" class="rounded-2xl aspect-square object-cover">
                    <h3 class="text-sm font-bold">${m.title}</h3>
                </div>`).join('');
        }

        function switchDashboardTab(tab) {
            ['home', 'profile', 'search'].forEach(t => {
                document.getElementById(`view-${t}`).classList.toggle('hidden', t !== tab);
                const btn = document.getElementById(`nav-btn-${t}`);
                btn.className = (t === tab) 
                    ? "flex-1 py-2 rounded-xl bg-[#FF3E1F] text-white" 
                    : "flex-1 py-2 rounded-xl bg-transparent text-zinc-400 border border-zinc-800";
            });
        }

        function handleSearch(q) { 
            renderMovies(cachedMovies.filter(m => m.title.toLowerCase().includes(q.toLowerCase())), 'search-results'); 
        }
        
        function setAuthState(s) { /* ... Logic ... */ }
        function executeAuthSubmit() { /* ... Logic ... */ }
        function logout() { supabase.auth.signOut(); location.reload(); }
        runInit();
    </script>
</body>
</html>
