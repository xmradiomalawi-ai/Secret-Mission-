<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XM STUDIO - PWA Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paychangu.com/v1/inline.js"></script>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-transitional">
    <meta name="apple-mobile-web-app-title" content="XM STUDIO">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    
    <style>
        body {
            background-color: #0c0c0e;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <div id="auth-gate" class="fixed inset-0 z-50 bg-[#0c0c0e] flex flex-col justify-center items-center px-6">
        <div class="w-full max-w-sm flex flex-col items-center justify-between h-[82vh]">
            
            <div class="flex flex-col items-center justify-center flex-grow">
                <div class="w-44 h-44 bg-black rounded-[40px] flex flex-col items-center justify-center border border-zinc-900 shadow-2xl overflow-hidden">
                    <img src="apple-touch-icon.png" alt="XM STUDIO Logo" class="w-full h-full object-cover onerror-fallback" onerror="this.style.display='none'; document.getElementById('logo-text-fallback').style.display='block';">
                    <span id="logo-text-fallback" style="display:none;" class="text-[#FF3E1F] font-black text-4xl tracking-tighter leading-none text-center">XM<br>STUDIO</span>
                </div>
            </div>

            <div class="w-full pb-8">
                
                <div id="state-welcome" class="space-y-4">
                    <button onclick="setAuthState('signin')" class="w-full bg-white text-black hover:bg-zinc-100 font-bold py-3.5 px-6 rounded-xl shadow-md text-sm transition-all border border-zinc-200">
                        Sign In
                    </button>
                    <button onclick="setAuthState('signup')" class="w-full bg-transparent hover:bg-zinc-900 text-white font-bold py-3.5 px-6 rounded-xl text-sm transition-all border border-zinc-700">
                        Sign Up
                    </button>
                </div>

                <div id="state-forms" class="hidden space-y-4">
                    <div class="space-y-3">
                        <div>
                            <label id="label-email" class="block text-xs text-zinc-400 mb-1 font-semibold pl-1">Email</label>
                            <input type="email" id="auth-email" placeholder="Enter your email" 
                                   class="w-full bg-zinc-950 border border-zinc-800 focus:border-[#FF3E1F] text-white py-3 px-4 rounded-xl placeholder-zinc-700 focus:outline-none transition text-sm">
                        </div>
                        
                        <div>
                            <label id="label-password" class="block text-xs text-zinc-400 mb-1 font-semibold pl-1">Password</label>
                            <input type="password" id="auth-password" placeholder="Enter password" 
                                   class="w-full bg-zinc-950 border border-zinc-800 focus:border-[#FF3E1F] text-white py-3 px-4 rounded-xl placeholder-zinc-700 focus:outline-none transition text-sm">
                        </div>

                        <div id="rewrite-password-container" class="hidden">
                            <label class="block text-xs text-zinc-400 mb-1 font-semibold pl-1">Rewrite Password</label>
                            <input type="password" id="auth-rewrite-password" placeholder="Re-enter password" 
                                   class="w-full bg-zinc-950 border border-zinc-800 focus:border-[#FF3E1F] text-white py-3 px-4 rounded-xl placeholder-zinc-700 focus:outline-none transition text-sm">
                        </div>
                    </div>

                    <div class="pt-2">
                        <button onclick="executeAuthSubmit()" id="btn-primary-action" 
                                class="w-full bg-white text-black hover:bg-zinc-100 font-bold py-3.5 px-6 rounded-xl shadow-md text-sm flex items-center justify-center gap-2 border border-zinc-200 transition-all duration-200">
                            <i id="auth-spinner" class="fa-solid fa-circle-notch animate-spin hidden"></i>
                            <span id="primary-btn-text">Sign In</span>
                        </button>
                    </div>

                    <div class="text-center pt-2 flex flex-col gap-2">
                        <button onclick="toggleAuthMode()" id="btn-toggle-view" class="text-xs text-zinc-500 hover:text-white transition duration-150 underline decoration-zinc-700 underline-offset-4">
                            Don't have an account? Sign Up instead
                        </button>
                        <button onclick="setAuthState('welcome')" class="text-xs text-zinc-600 hover:text-zinc-400 transition duration-150 flex items-center justify-center gap-1">
                            <i class="fa-solid fa-arrow-left text-[10px]"></i> Back to welcome screen
                        </button>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <div id="main-dashboard" class="hidden flex-grow flex flex-col">
        <header class="sticky top-0 z-40 bg-[#0c0c0e] bg-opacity-95 px-4 md:px-12 py-4 flex items-center justify-between border-b border-zinc-900">
            <span class="text-[#FF3E1F] font-black text-2xl tracking-wider">XM STUDIO</span>
            
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-zinc-500 text-xs hidden md:inline font-mono"></span>
                <button onclick="logout()" class="text-zinc-400 hover:text-white text-xs font-semibold uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-power-off"></i> Sign Out
                </button>
            </div>
        </header>

        <section class="relative h-[45vh] md:h-[60vh] w-full flex items-end bg-gradient-to-t from-[#0c0c0e] via-transparent to-black">
            <img id="hero-img" src="" alt="Hero Movie Background" class="absolute inset-0 w-full h-full object-cover -z-10 opacity-50">
            
            <div class="px-4 md:px-12 pb-8 max-w-2xl">
                <span class="text-[#FF3E1F] font-bold tracking-widest text-xs uppercase"><i class="fa-solid fa-star mr-1"></i> Global Showcase</span>
                <h1 id="hero-title" class="text-3xl md:text-5xl font-black mt-2 leading-none">Loading...</h1>
                <p id="hero-desc" class="text-zinc-400 text-xs md:text-sm mt-3 line-clamp-3">Loading details...</p>
                
                <div class="flex gap-3 mt-6" id="hero-purchase-actions">
                    <button id="btn-rent" class="bg-white text-black hover:bg-zinc-200 font-bold px-5 py-3 rounded-lg flex items-center gap-2 text-xs transition"></button>
                    <button id="btn-buy" class="bg-zinc-900 hover:bg-zinc-800 text-white font-bold px-5 py-3 rounded-lg flex items-center gap-2 text-xs transition border border-zinc-800"></button>
                </div>
                <button id="btn-watch-now" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold px-6 py-3.5 rounded-lg flex items-center gap-2 text-sm shadow-lg transition">
                    <i class="fa-solid fa-play"></i> Watch Movie Now
                </button>
            </div>
        </section>

        <main class="px-4 md:px-12 py-8 flex-grow">
            <h2 class="text-lg font-bold text-zinc-300 mb-6 flex items-center gap-2">
                <span class="w-1 h-5 bg-[#FF3E1F] rounded"></span> Showcase Catalog
            </h2>
            <div id="movie-catalog" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </main>

        <footer class="border-t border-zinc-900 py-4 text-center text-zinc-600 text-[10px]">
            <p>&copy; 2026 XM Studio. Independent, Mobile-First PWA.</p>
        </footer>
    </div>

    <script>
        // Production API Constants
        const SUPABASE_URL = "https://aqyypmswkyffnpsmqfwm.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxeXlwbXN3a3lmZm5wc21xZndtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDQ1MDUsImV4cCI6MjA5ODkyMDUwNX0.-0BF0z0l2aLF4nLc5qUWlAV7ypfwlGnMAtnX3--rEKo"; 
        const PAYCHANGU_PUBLIC_KEY = "pub-test-HYSBQpa5K91mmXMHrjhkmC6mAjObPJ2u"; 

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let activeUser = null;
        let selectedMovie = null;
        let currentAuthMode = 'welcome'; // Views: 'welcome', 'signin', 'signup'

        // Initialize state view controller
        async function runInit() {
            setAuthState('welcome'); // Start at welcome state by default
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                activeUser = session.user;
                showDashboard();
            } else {
                showAuthGate();
            }
        }

        // Toggles directly between signin and signup from footer link
        function toggleAuthMode() {
            if (currentAuthMode === 'signin') {
                setAuthState('signup');
            } else {
                setAuthState('signin');
            }
        }

        // State Machine controller to manage layouts seamlessly
        function setAuthState(state) {
            currentAuthMode = state;
            const welcomeDiv = document.getElementById('state-welcome');
            const formsDiv = document.getElementById('state-forms');
            const rewriteContainer = document.getElementById('rewrite-password-container');
            const primaryBtn = document.getElementById('btn-primary-action');
            const primaryBtnText = document.getElementById('primary-btn-text');
            const toggleBtn = document.getElementById('btn-toggle-view');

            if (state === 'welcome') {
                welcomeDiv.classList.remove('hidden');
                formsDiv.classList.add('hidden');
            } else {
                welcomeDiv.classList.add('hidden');
                formsDiv.classList.remove('hidden');

                if (state === 'signin') {
                    // Render Sign In Screen
                    rewriteContainer.classList.add('hidden');
                    primaryBtnText.innerText = "Sign In";
                    primaryBtn.className = "w-full bg-white text-black hover:bg-zinc-100 active:scale-[0.98] transition-all duration-200 font-bold py-3.5 px-6 rounded-xl shadow-md text-sm flex items-center justify-center gap-2 border border-zinc-200";
                    toggleBtn.innerText = "Don't have an account? Sign Up instead";
                } else if (state === 'signup') {
                    // Render Sign Up Screen
                    rewriteContainer.classList.remove('hidden');
                    primaryBtnText.innerText = "Sign Up";
                    primaryBtn.className = "w-full bg-white text-black hover:bg-zinc-100 active:scale-[0.98] transition-all duration-200 font-bold py-3.5 px-6 rounded-xl shadow-md text-sm flex items-center justify-center gap-2 border border-zinc-200";
                    toggleBtn.innerText = "Already have an account? Sign In instead";
                }
            }
        }

        // Execution Controller tied to Supabase API endpoints
        async function executeAuthSubmit() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const rewritePassword = document.getElementById('auth-rewrite-password').value.trim();
            const spinner = document.getElementById('auth-spinner');

            if (!email || !password) {
                alert("Please fill in your email address and password.");
                return;
            }

            if (currentAuthMode === 'signup') {
                if (password.length < 6) {
                    alert("Password must be at least 6 characters long.");
                    return;
                }
                if (password !== rewritePassword) {
                    alert("Passwords do not match. Please verify.");
                    return;
                }
            }

            spinner.classList.remove('hidden');

            if (currentAuthMode === 'signup') {
                // Execute Supabase sign up engine
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                spinner.classList.add('hidden');

                if (error) {
                    alert(`Sign Up error: ${error.message}`);
                } else {
                    alert("Account setup completed! Proceed to Sign In.");
                    setAuthState('signin');
                }
            } else {
                // Execute Supabase sign in verification
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                spinner.classList.add('hidden');

                if (error) {
                    alert(`Sign In error: ${error.message}`);
                } else {
                    activeUser = data.user;
                    showDashboard();
                }
            }
        }

        function showAuthGate() {
            document.getElementById('auth-gate').classList.remove('hidden');
            document.getElementById('main-dashboard').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = activeUser.email;
            fetchDashboardContent();
        }

        async function logout() {
            await supabase.auth.signOut();
            activeUser = null;
            showAuthGate();
            setAuthState('welcome');
        }

        async function fetchDashboardContent() {
            const { data: movies, error } = await supabase.from('movies').select('*');
            if (error || !movies.length) return;

            selectedMovie = movies[0];
            
            document.getElementById('hero-title').innerText = selectedMovie.title;
            document.getElementById('hero-desc').innerText = selectedMovie.description;
            document.getElementById('hero-img').src = selectedMovie.thumbnail_url;
            
            document.getElementById('btn-rent').innerHTML = `<i class="fa-solid fa-clock"></i> Rent MWK ${selectedMovie.rent_price}`;
            document.getElementById('btn-buy').innerHTML = `<i class="fa-solid fa-cart-shopping"></i> Buy MWK ${selectedMovie.buy_price}`;
        }

        runInit();
    </script>
</body>
</html>
