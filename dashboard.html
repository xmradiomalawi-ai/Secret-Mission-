<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XM STUDIO - PWA Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.44.0/dist/umd/supabase.js"></script>
    <script src="https://js.paychangu.com/v1/inline.js"></script>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-transitional">
    <meta name="apple-mobile-web-app-title" content="XM STUDIO">
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    
    <style>
        body {
            background-color: #0c0c0e;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #0c0c0e;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <div id="auth-gate" class="fixed inset-0 z-50 bg-[#0c0c0e] flex flex-col justify-center items-center px-6">
        <div class="w-full max-w-sm flex flex-col items-center justify-between h-[85vh]">
            
            <div class="flex flex-col items-center justify-center flex-grow">
                <div class="w-44 h-44 bg-black rounded-[40px] flex flex-col items-center justify-center border border-zinc-900 shadow-2xl overflow-hidden">
                    <img src="apple-touch-icon.png" alt="XM STUDIO Logo" class="w-full h-full object-cover" onerror="this.style.display='none'; document.getElementById('logo-text-fallback').style.[...]"
                    <span id="logo-text-fallback" style="display:none;" class="text-[#FF3E1F] font-black text-4xl tracking-tighter leading-none text-center">XM<br>STUDIO</span>
                </div>
            </div>

            <div class="w-full pb-8">
                <div id="state-welcome" class="space-y-4">
                    <button onclick="setAuthState('signin')" class="w-full bg-white text-black hover:bg-zinc-100 font-bold py-3.5 px-6 rounded-xl shadow-md text-sm transition-all border border-zin[...]">
                        Sign In
                    </button>
                    <button onclick="setAuthState('signup')" class="w-full bg-transparent hover:bg-zinc-900 text-white font-bold py-3.5 px-6 rounded-xl text-sm transition-all border border-zinc-70[...]">
                        Sign Up
                    </button>
                </div>

                <div id="state-forms" class="hidden space-y-4">
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1 font-semibold pl-1">Email</label>
                            <input type="email" id="auth-email" placeholder="Enter your email" 
                                   class="w-full bg-zinc-950 border border-zinc-800 focus:border-[#FF3E1F] text-white py-3 px-4 rounded-xl placeholder-zinc-700 focus:outline-none transition text-s[...]">
                        </div>
                        
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1 font-semibold pl-1">Password</label>
                            <input type="password" id="auth-password" placeholder="Enter password" 
                                   class="w-full bg-zinc-950 border border-zinc-800 focus:border-[#FF3E1F] text-white py-3 px-4 rounded-xl placeholder-zinc-700 focus:outline-none transition text-s[...]">
                        </div>

                        <div id="rewrite-password-container" class="hidden">
                            <label class="block text-xs text-zinc-400 mb-1 font-semibold pl-1">Rewrite Password</label>
                            <input type="password" id="auth-rewrite-password" placeholder="Re-enter password" 
                                   class="w-full bg-zinc-950 border border-zinc-800 focus:border-[#FF3E1F] text-white py-3 px-4 rounded-xl placeholder-zinc-700 focus:outline-none transition text-s[...]">
                        </div>
                    </div>

                    <div class="pt-2">
                        <button onclick="executeAuthSubmit()" id="btn-primary-action" 
                                class="w-full bg-white text-black hover:bg-zinc-100 font-bold py-3.5 px-6 rounded-xl shadow-md text-sm flex items-center justify-center gap-2 border border-zinc-200[...]">
                            <i id="auth-spinner" class="fa-solid fa-circle-notch animate-spin hidden"></i>
                            <span id="primary-btn-text">Sign In</span>
                        </button>
                    </div>

                    <div class="text-center pt-2 flex flex-col gap-2">
                        <button onclick="toggleAuthMode()" id="btn-toggle-view" class="text-xs text-zinc-500 hover:text-white transition duration-150 underline decoration-zinc-700 underline-offset[...]">
                            Don't have an account? Sign Up instead
                        </button>
                        <button onclick="setAuthState('welcome')" class="text-xs text-zinc-600 hover:text-zinc-400 transition duration-150 flex items-center justify-center gap-1">
                            <i class="fa-solid fa-arrow-left text-[10px]"></i> Back to welcome screen
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="main-dashboard" class="hidden flex-grow flex flex-col min-h-screen pb-24 bg-[#0c0c0e]">
        <header class="sticky top-0 z-40 bg-[#0c0c0e] px-6 py-4 flex items-center justify-between border-b border-zinc-900">
            <span class="text-[#FF3E1F] font-black text-xl tracking-wider">XM STUDIO</span>
            <div class="flex items-center gap-2">
                <span id="user-display" class="text-zinc-500 text-[10px] font-mono hidden md:inline"></span>
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            </div>
        </header>

        <main id="view-home" class="px-6 py-6 flex-grow overflow-y-auto custom-scroll">
            <div id="movie-catalog" class="grid grid-cols-2 gap-x-6 gap-y-8 max-w-md mx-auto">
                <div class="animate-pulse flex flex-col space-y-3">
                    <div class="aspect-square bg-zinc-900 rounded-2xl"></div>
                    <div class="h-4 bg-zinc-900 rounded w-2/3"></div>
                </div>
                <div class="animate-pulse flex flex-col space-y-3">
                    <div class="aspect-square bg-zinc-900 rounded-2xl"></div>
                    <div class="h-4 bg-zinc-900 rounded w-1/2"></div>
                </div>
            </div>
        </main>

        <main id="view-search" class="hidden px-6 py-6 flex-grow max-w-md mx-auto w-full">
            <h2 class="text-xl font-bold text-white mb-4">Search Catalog</h2>
            <div class="relative mb-6">
                <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="Search songs, movies, or creators..." 
                       class="w-full bg-zinc-900 border border-zinc-800 text-white py-3 pl-11 pr-4 rounded-xl placeholder-zinc-500 focus:outline-none focus:border-[#FF3E1F] text-sm">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-zinc-500 text-sm"></i>
            </div>
            <div id="search-results" class="grid grid-cols-2 gap-x-6 gap-y-8">
                <p class="text-zinc-500 text-xs col-span-2 text-center py-8">Type to begin searching...</p>
            </div>
        </main>

        <main id="view-profile" class="hidden px-6 py-6 flex-grow max-w-md mx-auto w-full flex flex-col justify-between">
            <div class="space-y-6">
                <div>
                    <h2 class="text-xl font-bold text-white mb-4">Profile Portal</h2>
                    <div class="bg-zinc-950 border border-zinc-900 rounded-2xl p-5 flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-[#FF3E1F] font-bold">
                            <i class="fa-solid fa-user text-lg"></i>
                        </div>
                        <div>
                            <p class="text-[10px] text-zinc-500 font-medium">Logged in as</p>
                            <p id="profile-email-display" class="text-xs font-semibold text-white break-all">user@domain.com</p>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-zinc-400 mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-film text-[#FF3E1F]"></i> Your Library (Purchased)
                    </h3>
                    <div id="user-library-container" class="grid grid-cols-2 gap-4">
                        <p class="text-zinc-600 text-xs col-span-2">No purchased titles found.</p>
                    </div>
                </div>
            </div>

            <div class="pt-8">
                <button onclick="logout()" class="w-full bg-zinc-950 hover:bg-zinc-900 text-[#FF3E1F] font-bold py-3.5 rounded-xl border border-zinc-900 text-xs transition uppercase tracking-wide[...]">
                    <i class="fa-solid fa-power-off mr-2"></i> Log Out
                </button>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#0c0c0e] border-t border-zinc-900 py-4 px-8 z-40 flex justify-center items-center">
            <div class="flex items-center justify-between w-full max-w-sm gap-2">
                
                <button id="nav-btn-home" onclick="switchDashboardTab('home')" 
                        class="flex-1 py-2 flex items-center justify-center rounded-xl bg-[#FF3E1F] text-white border border-[#FF3E1F] shadow-lg transition-all duration-150">
                    <i class="fa-solid fa-house text-lg"></i>
                </button>

                <button id="nav-btn-profile" onclick="switchDashboardTab('profile')" 
                        class="flex-1 py-2 flex items-center justify-center rounded-xl bg-transparent text-zinc-400 border border-zinc-800 hover:border-zinc-600 transition-all duration-150">
                    <i class="fa-solid fa-user text-lg"></i>
                </button>

                <button id="nav-btn-search" onclick="switchDashboardTab('search')" 
                        class="flex-1 py-2 flex items-center justify-center rounded-xl bg-transparent text-zinc-400 border border-zinc-800 hover:border-zinc-600 transition-all duration-150">
                    <i class="fa-solid fa-magnifying-glass text-lg"></i>
                </button>
                
            </div>
        </nav>
    </div>

    <script>
        const SUPABASE_URL = "https://aqyypmswkyffnpsmqfwm.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxeXlwbXN3a3lmZm5wc21xZndtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDQ1MDUsImV4cCI6MjA5ODkyMDU[...]"

        let supabase;
        let activeUser = null;
        let cachedMovies = [];
        let currentAuthMode = 'welcome';

        async function runInit() {
            setAuthState('welcome');
            
            const supabaseLib = window.supabase || (window.supabaseJS ? window.supabaseJS : null);
            if (!supabaseLib) {
                console.error("Critical error: Supabase CDN library is unreachable.");
                alert("Failed to connect to security portal. Please verify your internet connection.");
                return;
            }

            try {
                supabase = supabaseLib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                const { data: { session }, error } = await supabase.auth.getSession();
                if (session && !error) {
                    activeUser = session.user;
                    showDashboard();
                } else {
                    showAuthGate();
                }
            } catch (err) {
                console.error("Session configuration failed:", err);
                showAuthGate();
            }
        }

        function toggleAuthMode() {
            if (currentAuthMode === 'signin') {
                setAuthState('signup');
            } else {
                setAuthState('signin');
            }
        }

        function setAuthState(state) {
            currentAuthMode = state;
            const welcomeDiv = document.getElementById('state-welcome');
            const formsDiv = document.getElementById('state-forms');
            const rewriteContainer = document.getElementById('rewrite-password-container');
            const primaryBtnText = document.getElementById('primary-btn-text');
            const toggleBtn = document.getElementById('btn-toggle-view');

            if (state === 'welcome') {
                welcomeDiv.classList.remove('hidden');
                formsDiv.classList.add('hidden');
            } else {
                welcomeDiv.classList.add('hidden');
                formsDiv.classList.remove('hidden');

                if (state === 'signin') {
                    rewriteContainer.classList.add('hidden');
                    primaryBtnText.innerText = "Sign In";
                    toggleBtn.innerText = "Don't have an account? Sign Up instead";
                } else if (state === 'signup') {
                    rewriteContainer.classList.remove('hidden');
                    primaryBtnText.innerText = "Sign Up";
                    toggleBtn.innerText = "Already have an account? Sign In instead";
                }
            }
        }

        async function executeAuthSubmit() {
            if (!supabase) {
                alert("Network gateway still starting up. Please hold on a second.");
                return;
            }

            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const rewritePassword = document.getElementById('auth-rewrite-password').value.trim();
            const spinner = document.getElementById('auth-spinner');

            if (!email || !password) {
                alert("Please fill in your email address and password.");
                return;
            }

            if (currentAuthMode === 'signup') {
                if (password.length < 6) {
                    alert("Password must be at least 6 characters long.");
                    return;
                }
                if (password !== rewritePassword) {
                    alert("Passwords do not match. Please verify.");
                    return;
                }
            }

            spinner.classList.remove('hidden');

            try {
                if (currentAuthMode === 'signup') {
                    const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
                        email: email,
                        password: password
                    });

                    if (signUpError) {
                        spinner.classList.add('hidden');
                        alert(`Sign Up error: ${signUpError.message}`);
                        return;
                    }

                    const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    spinner.classList.add('hidden');

                    if (signInError) {
                        alert("Account created successfully! Please sign in.");
                        setAuthState('signin');
                    } else {
                        activeUser = signInData.user;
                        showDashboard();
                    }

                } else {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    spinner.classList.add('hidden');

                    if (error) {
                        alert(`Sign In error: ${error.message}`);
                    } else {
                        activeUser = data.user;
                        showDashboard();
                    }
                }
            } catch (err) {
                spinner.classList.add('hidden');
                alert("A connection error occurred. Please try again.");
                console.error(err);
            }
        }

        function showAuthGate() {
            document.getElementById('auth-gate').classList.remove('hidden');
            document.getElementById('main-dashboard').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = activeUser.email;
            document.getElementById('profile-email-display').innerText = activeUser.email;
            
            switchDashboardTab('home');
            fetchDashboardContent();
            fetchUserLibrary();
        }

        async function logout() {
            try {
                if (supabase) {
                    await supabase.auth.signOut();
                }
            } catch (err) {
                console.error("Sign out session error:", err);
            }
            activeUser = null;
            showAuthGate();
            setAuthState('welcome');
        }

        // SPA View Controller (Switches views & manages Bottom Navigation Highlight styling)
        function switchDashboardTab(tabName) {
            const tabs = ['home', 'profile', 'search'];
            tabs.forEach(t => {
                const view = document.getElementById(`view-${t}`);
                if (view) {
                    if (t === tabName) {
                        view.classList.remove('hidden');
                    } else {
                        view.classList.add('hidden');
                    }
                }

                const btn = document.getElementById(`nav-btn-${t}`);
                if (btn) {
                    if (t === tabName) {
                        // Custom sketch style: Home/Active item gets flat red background fill, white icon.
                        btn.className = "flex-1 py-2 flex items-center justify-center rounded-xl bg-[#FF3E1F] text-white border border-[#FF3E1F] shadow-lg transition-all duration-150";
                    } else {
                        // Standard wireframe style
                        btn.className = "flex-1 py-2 flex items-center justify-center rounded-xl bg-transparent text-zinc-400 border border-zinc-800 hover:border-zinc-600 transition-all duration-[...]";
                    }
                }
            });
        }

        async function fetchDashboardContent() {
            try {
                const { data: movies, error } = await supabase.from('movies').select('*');
                if (error) throw error;

                cachedMovies = movies || [];
                renderMovies(cachedMovies, 'movie-catalog');
            } catch (err) {
                console.error("Error retrieving catalog:", err);
            }
        }

        // Updated logic: Retrieves user-purchased items by querying the purchases table
        async function fetchUserLibrary() {
            try {
                const container = document.getElementById('user-library-container');
                
                // 1. Fetch the list of movie IDs purchased by the active user
                const { data: purchaseData, error: purchaseError } = await supabase
                    .from('purchases')
                    .select('movie_id')
                    .eq('user_id', activeUser.id);
                    
                if (purchaseError || !purchaseData || purchaseData.length === 0) {
                    container.innerHTML = `<p class="text-zinc-600 text-xs col-span-2">No purchased items yet.</p>`;
                    return;
                }

                // 2. Extract the IDs from the purchase records
                const purchasedMovieIds = purchaseData.map(p => p.movie_id);

                // 3. Fetch the actual movie details for those IDs
                const { data: library, error: movieError } = await supabase
                    .from('movies')
                    .select('*')
                    .in('id', purchasedMovieIds);

                if (movieError || !library || library.length === 0) {
                    container.innerHTML = `<p class="text-zinc-600 text-xs col-span-2">No purchased titles found.</p>`;
                    return;
                }

                // 4. Render the library
                container.innerHTML = library.map(movie => {
                    const img = movie.thumbnail_url ? movie.thumbnail_url : 'apple-touch-icon.png';
                    return `
                        <div class="flex flex-col space-y-2 cursor-pointer group" onclick="playMovie('${movie.id}')">
                            <div class="aspect-square w-full rounded-xl bg-zinc-950 border border-zinc-900 overflow-hidden shadow-md">
                                <img src="${img}" alt="${movie.title}" class="w-full h-full object-cover">
                            </div>
                            <h4 class="text-white text-xs font-bold truncate">${movie.title}</h4>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error("Error fetching library:", err);
            }
        }

        // Grid renderer (Converts items inside "movies" table to clean album-art columns)
        function renderMovies(moviesList, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (moviesList.length === 0) {
                container.innerHTML = `<p class="text-zinc-500 text-xs text-center col-span-2 py-8">No movies found.</p>`;
                return;
            }

            container.innerHTML = moviesList.map(movie => {
                const imageSource = movie.thumbnail_url ? movie.thumbnail_url : 'apple-touch-icon.png';
                return `
                    <div class="flex flex-col space-y-3 cursor-pointer group" onclick="playMovie('${movie.id}')">
                        <div class="aspect-square w-full rounded-2xl bg-zinc-950 border border-zinc-900 overflow-hidden shadow-md group-hover:border-zinc-700 transition">
                            <img src="${imageSource}" alt="${movie.title}" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <h3 class="text-white text-sm font-bold tracking-tight leading-snug break-words">${movie.title}</h3>
                            <p class="text-[10px] text-zinc-500 font-medium">${movie.creator_name || 'XM Creator'}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Live, high-performance catalog filter
        function handleSearch(query) {
            const filtered = cachedMovies.filter(movie => 
                movie.title.toLowerCase().includes(query.toLowerCase()) || 
                (movie.creator_name && movie.creator_name.toLowerCase().includes(query.toLowerCase()))
            );
            renderMovies(filtered, 'search-results');
        }

        function playMovie(id) {
            const movie = cachedMovies.find(m => m.id === id);
            if (movie) {
                alert(`Selected Title: ${movie.title}\nStreaming Source: ${movie.thumbnail_url}`);
            }
        }

        runInit();
    </script>
</body>
</html>
