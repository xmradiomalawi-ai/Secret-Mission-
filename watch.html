<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THK Private Screening</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* The Loading Spinner */
        #loader { border: 4px solid #222; border-top: 4px solid #fff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; position: absolute; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        video { width: 100%; max-width: 800px; display: none; outline: none; box-shadow: 0 0 30px rgba(255,255,255,0.05); }
        .theatre-text { position: absolute; bottom: 30px; color: #333; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="loader"></div>

    <video id="cinemaPlayer" controls playsinline preload="auto">
        <source src="https://pub-ee2c0439adb34195bad8ead3bc041170.r2.dev/The%20Modern%20African.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="theatre-text">THK Studio | Cinema of the Continent</div>

    <script>
        const video = document.getElementById('cinemaPlayer');
        const loader = document.getElementById('loader');

        // This triggers when enough data is buffered to play smoothly
        video.oncanplay = function() {
            loader.style.display = 'none'; 
            video.style.display = 'block';
            // Auto-play attempt (might be muted by browser policy)
            video.play().catch(error => {
                console.log("Autoplay prevented, user must click play.");
            });
        };
    </script>
</body>
</html>
