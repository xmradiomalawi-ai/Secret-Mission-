<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .back-btn { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); color: white; border: 1px solid white; padding: 10px 15px; border-radius: 4px; cursor: pointer; z-index: 10; font-family: sans-serif; text-decoration: none;}
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅ Go Back</a>
    <video id="video-player" controls autoplay></video>

    <script>
        const SUPABASE_URL = "YOUR_SUPABASE_URL_HERE"; 
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY_HERE"; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function verifyAndPlay() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                alert("Unauthorized! Please sign in first.");
                window.location.href = "index.html";
                return;
            }

            // Fetch the movie
            const { data: movie } = await supabase.from('movies').select('*').limit(1).single();
            if (!movie) return;

            // Confirm active rental or purchase
            const { data: purchases } = await supabase.from('purchases').select('*').eq('user_id', session.user.id).eq('movie_id', movie.id);
            const hasAccess = purchases?.some(p => {
                if (p.purchase_type === 'buy') return true;
                if (p.purchase_type === 'rent') return new Date(p.expires_at) > new Date();
                return false;
            });

            if (hasAccess) {
                startStream(movie.video_url);
            } else {
                alert("Please purchase or rent the film to play.");
                window.location.href = "index.html";
            }
        }

        function startStream(url) {
            const video = document.getElementById('video-player');
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        }

        verifyAndPlay();
    </script>
</body>
</html>
